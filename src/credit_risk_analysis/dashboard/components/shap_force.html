<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHAP Force Plot Explanation</title>
    <script src="https://cdn.jsdelivr.net/npm/shapjs@latest/dist/shap.min.js"></script>
    <style>
        body {
            /* S4649: Se añade la familia genérica 'sans-serif' */
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 5px;
        }
        #plot {
            width: 100%;
            height: 300px;
        }
    </style>
</head>
<body>
    <div id="plot"></div>

    <script>
        /**
         * Renderiza el force plot de SHAP.
         * @param {Object} shapData - Contiene base_value, values, features y data.
         */
        function renderForcePlot(shapData) {
            const plot = document.getElementById("plot");
            if (!plot) return;

            const baseValue = shapData.base_value;
            const values = shapData.values;
            const features = shapData.features;
            const data = shapData.data;

            // Asegúrate de que la librería 'shap' esté cargada correctamente
            if (typeof shap !== 'undefined' && shap.force_plot) {
                shap.force_plot(
                    baseValue,
                    values,
                    data,
                    features,
                    plot
                );
            }
        }

        // S7764: Preferir globalThis sobre window
        globalThis.renderForcePlot = renderForcePlot;
    </script>
</body>
</html>

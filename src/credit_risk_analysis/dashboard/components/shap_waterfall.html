<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SHAP Waterfall Explanation</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            /* S4649: Siempre añadir familia genérica como 'sans-serif' */
            font-family: Arial, Helvetica, sans-serif;
            margin: 0;
            padding: 10px;
        }
        canvas {
            width: 100%;
            height: 400px;
        }
    </style>
</head>
<body>
    <canvas id="waterfall"></canvas>

    <script>
        /**
         * Renderiza el gráfico de impacto SHAP.
         * @param {Object} shapData - Datos de impacto de características.
         */
        function renderWaterfall(shapData) {
            const ctx = document.getElementById("waterfall");
            if (!ctx) return;

            const labels = shapData.features;
            const values = shapData.values;

            new Chart(ctx, {
                type: "bar",
                data: {
                    labels: labels,
                    datasets: [{
                        label: "SHAP Impact",
                        data: values,
                        backgroundColor: values.map(v => v > 0 ? '#ff4b4b' : '#1f77b4')
                    }]
                },
                options: {
                    indexAxis: 'y', // Waterfall visual style
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        }

        // S7764: Usar globalThis en lugar de window para entornos modernos
        globalThis.renderWaterfall = renderWaterfall;
    </script>
</body>
</html>
